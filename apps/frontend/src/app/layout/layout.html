<div class="app">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <rect x="3" y="3" width="7" height="9" rx="1"/>
        <rect x="14" y="3" width="7" height="5" rx="1"/>
        <rect x="14" y="12" width="7" height="9" rx="1"/>
        <rect x="3" y="16" width="7" height="5" rx="1"/>
      </svg>
      <span>Integration Hub</span>
    </div>

    <div class="sidebar-section">Workspace</div>

    <a routerLink="/dashboard" routerLinkActive #rla_d="routerLinkActive"
       class="nav-item" [attr.data-active]="rla_d.isActive">
      <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <rect x="3" y="3" width="7" height="9" rx="1"/>
        <rect x="14" y="3" width="7" height="5" rx="1"/>
        <rect x="14" y="12" width="7" height="9" rx="1"/>
        <rect x="3" y="16" width="7" height="5" rx="1"/>
      </svg>
      <span>Dashboard</span>
    </a>

    <a routerLink="/integrations" routerLinkActive #rla_i="routerLinkActive"
       class="nav-item" [attr.data-active]="rla_i.isActive">
      <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M9 2v6"/><path d="M15 2v6"/>
        <path d="M5 8h14v3a5 5 0 0 1-5 5h-4a5 5 0 0 1-5-5z"/>
        <path d="M12 16v6"/>
      </svg>
      <span>Integrations</span>
    </a>

    <a routerLink="/webhook-endpoints" routerLinkActive #rla_ep="routerLinkActive"
       class="nav-item" [attr.data-active]="rla_ep.isActive">
      <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M18 16.98h-5.99c-1.1 0-1.95.94-2.48 1.9A4 4 0 0 1 2 17a3.98 3.98 0 0 1 2.65-3.78"/>
        <path d="m12 8 3-5.21"/>
        <path d="M16 13v-3a4 4 0 0 1 8 0c0 1.1-.45 2.1-1.18 2.83"/>
        <path d="M5.91 11.42a4 4 0 0 1 5.74-2.42"/>
      </svg>
      <span>Endpoints</span>
    </a>

    <div class="sidebar-section">Activity</div>

    <a routerLink="/webhook-events" routerLinkActive #rla_ev="routerLinkActive"
       class="nav-item" [attr.data-active]="rla_ev.isActive">
      <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
      </svg>
      <span>Events</span>
    </a>

    <a routerLink="/workflows" routerLinkActive #rla_wf="routerLinkActive"
       class="nav-item" [attr.data-active]="rla_wf.isActive">
      <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="5" cy="6" r="2"/><circle cx="19" cy="6" r="2"/><circle cx="12" cy="18" r="2"/>
        <path d="M7 6h10"/>
        <path d="M5 8v2a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8"/>
        <path d="M12 14v2"/>
      </svg>
      <span>Workflows</span>
    </a>

    <a routerLink="/executions" routerLinkActive #rla_ex="routerLinkActive"
       class="nav-item" [attr.data-active]="rla_ex.isActive">
      <svg viewBox="0 0 24 24" width="15" height="15" fill="currentColor" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <polygon points="6 4 20 12 6 20 6 4"/>
      </svg>
      <span>Executions</span>
    </a>

    <div class="spacer"></div>

    <div class="sidebar-footer">
      <div style="width:24px;height:24px;border-radius:50%;background:var(--accent-bg-strong);display:flex;align-items:center;justify-content:center;font-size:var(--text-xs);font-weight:600;color:var(--accent-300);flex-shrink:0">
        {{ initials() }}
      </div>
      <div class="vstack" style="gap:0;overflow:hidden;flex:1;min-width:0">
        <span style="font-size:var(--text-sm);font-weight:500;color:var(--fg-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">{{ auth.user()?.name }}</span>
        <span style="font-size:var(--text-xs);color:var(--fg-tertiary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">{{ auth.user()?.email }}</span>
      </div>
      <button class="btn btn-ghost btn-sm" (click)="logout()">Out</button>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <div class="hstack" style="gap:var(--space-2);flex:1">
        <span style="font-size:var(--text-sm);color:var(--fg-secondary)">Integration Hub</span>
      </div>
    </div>
    <div class="content">
      <div class="content-narrow">
        <router-outlet />
      </div>
    </div>
  </div>
</div>
