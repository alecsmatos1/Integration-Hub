<div class="auth-page">
  <div class="auth-card">
    <h1>Integration Hub</h1>
    <h2>Sign in</h2>

    @if (error()) {
      <div class="alert error">{{ error() }}</div>
    }

    <form (ngSubmit)="submit()">
      <label>
        Email
        <input type="email" [(ngModel)]="email" name="email" required autocomplete="email" />
      </label>
      <label>
        Password
        <input type="password" [(ngModel)]="password" name="password" required autocomplete="current-password" />
      </label>
      <button type="submit" [disabled]="loading()">
        {{ loading() ? 'Signing in...' : 'Sign in' }}
      </button>
    </form>

    <p class="switch">No account? <a routerLink="/register">Register</a></p>
  </div>
</div>
