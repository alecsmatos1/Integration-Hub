<div style="min-height:100dvh;background:var(--bg-canvas);display:flex;align-items:center;justify-content:center">
  <div style="width:100%;max-width:400px;padding:var(--space-9) var(--space-6)">
    <div class="sidebar-brand" style="padding:0;margin-bottom:var(--space-9)">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="9" rx="1"/>
        <rect x="14" y="3" width="7" height="5" rx="1"/>
        <rect x="14" y="12" width="7" height="9" rx="1"/>
        <rect x="3" y="16" width="7" height="5" rx="1"/>
      </svg>
      <span>Integration Hub</span>
    </div>

    <h1 style="font-size:var(--text-2xl);line-height:var(--lh-2xl);font-weight:600;letter-spacing:var(--tracking-tighter);margin:0">
      Sign in to your workspace
    </h1>
    <p style="color:var(--fg-secondary);margin-top:var(--space-2);font-size:var(--text-md);margin-bottom:var(--space-8)">
      Manage GitHub webhooks, workflows and execution logs.
    </p>

    @if (error()) {
      <div class="badge badge-danger" style="display:flex;gap:var(--space-2);padding:var(--space-3);height:auto;border-radius:var(--radius);margin-bottom:var(--space-4)">
        {{ error() }}
      </div>
    }

    <form (ngSubmit)="submit()" class="vstack" style="gap:var(--space-4)">
      <div class="field">
        <label class="field-label">Email</label>
        <input class="input" type="email" [(ngModel)]="email" name="email" required autocomplete="email" placeholder="you@example.com" />
      </div>
      <div class="field">
        <label class="field-label">Password</label>
        <input class="input" type="password" [(ngModel)]="password" name="password" required autocomplete="current-password" />
      </div>
      <button type="submit" class="btn btn-primary btn-lg" [disabled]="loading()" style="width:100%;margin-top:var(--space-2)">
        @if (loading()) { <span class="spinner"></span> }
        {{ loading() ? 'Signing in...' : 'Sign in' }}
      </button>
    </form>

    <p style="margin-top:var(--space-6);color:var(--fg-tertiary);font-size:var(--text-sm);text-align:center">
      No account? <a routerLink="/register" style="color:var(--accent-300);font-weight:500">Create one</a>
    </p>
  </div>
</div>
